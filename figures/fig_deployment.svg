<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" role="img" aria-label="Deployment geometry — 4 BSs, 40 users, 10 targets">
  <defs>
    <radialGradient id="hotspot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c7d2fe" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c7d2fe" stop-opacity="0"/>
    </radialGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#111827">
    Cell-Free Deployment Geometry  —  1 km² area, 450 m hotspot radius
  </text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#4b5563">
    4 base stations  ·  256-antenna aggregate  ·  40 users and 10 targets inside hotspot
  </text>

  <!-- Area square: map 1000m × 1000m onto pixel box 80..720, 100..740 (640×640) -->
  <g transform="translate(160,90)">
    <rect width="640" height="640" fill="#fafafa" stroke="#9ca3af"/>
    <!-- grid -->
    <g stroke="#e5e7eb" stroke-width="1">
      <line x1="128" y1="0"  x2="128" y2="640"/>
      <line x1="256" y1="0"  x2="256" y2="640"/>
      <line x1="384" y1="0"  x2="384" y2="640"/>
      <line x1="512" y1="0"  x2="512" y2="640"/>
      <line x1="0"  y1="128" x2="640" y2="128"/>
      <line x1="0"  y1="256" x2="640" y2="256"/>
      <line x1="0"  y1="384" x2="640" y2="384"/>
      <line x1="0"  y1="512" x2="640" y2="512"/>
    </g>
    <!-- axis labels -->
    <text x="0"   y="656" font-size="11" fill="#6b7280">0 m</text>
    <text x="320" y="656" text-anchor="middle" font-size="11" fill="#6b7280">500 m</text>
    <text x="640" y="656" text-anchor="end" font-size="11" fill="#6b7280">1000 m</text>
    <text x="-8"  y="640" text-anchor="end" font-size="11" fill="#6b7280">0 m</text>
    <text x="-8"  y="320" text-anchor="end" font-size="11" fill="#6b7280">500 m</text>
    <text x="-8"  y="8"   text-anchor="end" font-size="11" fill="#6b7280">1000 m</text>

    <!-- hotspot -->
    <circle cx="320" cy="320" r="288" fill="url(#hotspot)"/>
    <circle cx="320" cy="320" r="288" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="320" y="320" text-anchor="middle" font-size="13" fill="#4338ca" font-weight="600">hotspot  r = 450 m</text>

    <!-- BSs at (250,750) (750,750) (250,250) (750,250) in metres -->
    <!-- map: px = m * 0.64 -->
    <g>
      <!-- BS1 at (250,250) -->
      <g transform="translate(160,480)">
        <circle r="12" fill="#1f4e79"/>
        <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">1</text>
        <text x="0" y="-18" text-anchor="middle" font-size="11" fill="#1f4e79" font-weight="700">BS-1</text>
      </g>
      <g transform="translate(480,480)">
        <circle r="12" fill="#1f4e79"/>
        <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">2</text>
        <text x="0" y="-18" text-anchor="middle" font-size="11" fill="#1f4e79" font-weight="700">BS-2</text>
      </g>
      <g transform="translate(160,160)">
        <circle r="12" fill="#1f4e79"/>
        <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">3</text>
        <text x="0" y="-18" text-anchor="middle" font-size="11" fill="#1f4e79" font-weight="700">BS-3</text>
      </g>
      <g transform="translate(480,160)">
        <circle r="12" fill="#1f4e79"/>
        <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">4</text>
        <text x="0" y="-18" text-anchor="middle" font-size="11" fill="#1f4e79" font-weight="700">BS-4</text>
      </g>
    </g>

    <!-- JT links between BSs -->
    <g stroke="#1f4e79" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.6">
      <line x1="160" y1="480" x2="480" y2="480"/>
      <line x1="160" y1="160" x2="480" y2="160"/>
      <line x1="160" y1="480" x2="160" y2="160"/>
      <line x1="480" y1="480" x2="480" y2="160"/>
      <line x1="160" y1="480" x2="480" y2="160"/>
      <line x1="480" y1="480" x2="160" y2="160"/>
    </g>
    <text x="320" y="456" text-anchor="middle" font-size="10" fill="#1f4e79" font-style="italic">fronthaul JT-RZF coordination</text>

    <!-- Users: 40 deterministic-looking positions inside hotspot -->
    <g fill="#27ae60">
      <circle cx="300" cy="310" r="3.5"/><circle cx="356" cy="270" r="3.5"/>
      <circle cx="260" cy="350" r="3.5"/><circle cx="410" cy="330" r="3.5"/>
      <circle cx="330" cy="400" r="3.5"/><circle cx="380" cy="210" r="3.5"/>
      <circle cx="200" cy="280" r="3.5"/><circle cx="450" cy="250" r="3.5"/>
      <circle cx="210" cy="430" r="3.5"/><circle cx="470" cy="420" r="3.5"/>
      <circle cx="160" cy="340" r="3.5"/><circle cx="510" cy="350" r="3.5"/>
      <circle cx="280" cy="170" r="3.5"/><circle cx="300" cy="500" r="3.5"/>
      <circle cx="150" cy="250" r="3.5"/><circle cx="520" cy="260" r="3.5"/>
      <circle cx="130" cy="380" r="3.5"/><circle cx="540" cy="400" r="3.5"/>
      <circle cx="350" cy="140" r="3.5"/><circle cx="370" cy="540" r="3.5"/>
      <circle cx="400" cy="170" r="3.5"/><circle cx="260" cy="530" r="3.5"/>
      <circle cx="240" cy="200" r="3.5"/><circle cx="450" cy="480" r="3.5"/>
      <circle cx="220" cy="480" r="3.5"/><circle cx="470" cy="180" r="3.5"/>
      <circle cx="320" cy="230" r="3.5"/><circle cx="340" cy="460" r="3.5"/>
      <circle cx="390" cy="380" r="3.5"/><circle cx="270" cy="390" r="3.5"/>
      <circle cx="180" cy="310" r="3.5"/><circle cx="510" cy="300" r="3.5"/>
      <circle cx="290" cy="280" r="3.5"/><circle cx="420" cy="280" r="3.5"/>
      <circle cx="240" cy="440" r="3.5"/><circle cx="430" cy="440" r="3.5"/>
      <circle cx="310" cy="360" r="3.5"/><circle cx="360" cy="320" r="3.5"/>
      <circle cx="280" cy="450" r="3.5"/><circle cx="395" cy="420" r="3.5"/>
    </g>

    <!-- Targets: 10 distinct markers -->
    <g fill="none" stroke="#c0392b" stroke-width="2">
      <polygon points="0,-7 6,5 -6,5" transform="translate(220,220)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(340,250)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(430,300)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(300,370)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(200,400)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(480,370)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(390,450)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(250,480)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(420,200)"/>
      <polygon points="0,-7 6,5 -6,5" transform="translate(155,360)"/>
    </g>

    <!-- One sensing beam sketch -->
    <g opacity="0.45">
      <path d="M160 480 L300 370 L 290 370 Z" fill="#fca5a5"/>
      <path d="M480 480 L300 370 L 310 370 Z" fill="#fca5a5"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(770,100)" font-size="12">
    <rect width="180" height="170" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="90" y="22" text-anchor="middle" font-weight="700">Legend</text>
    <circle cx="20" cy="48" r="8" fill="#1f4e79"/><text x="36" y="52">Base station (8×8 UPA)</text>
    <circle cx="20" cy="74" r="4" fill="#27ae60"/><text x="36" y="78">User  (40 total)</text>
    <polygon points="0,-6 5,4 -5,4" fill="none" stroke="#c0392b" stroke-width="2" transform="translate(20,102)"/>
    <text x="36" y="106">Target (10 total)</text>
    <circle cx="20" cy="130" r="6" fill="url(#hotspot)" stroke="#6366f1" stroke-dasharray="3 2"/>
    <text x="36" y="134">Hotspot 450 m</text>
    <rect x="14" y="150" width="12" height="6" fill="#fca5a5" opacity="0.6"/>
    <text x="36" y="158">Joint sensing beam</text>
  </g>
</svg>
